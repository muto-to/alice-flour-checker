<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Checker + Cooking Refining Timer</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5eddb;
      color: #3d3024;
      margin: 0;
      padding: 24px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      background: #fffaf0;
      border: 2px solid #d8c39b;
      border-radius: 20px;
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-top: 18px;
      margin-bottom: 8px;
    }
    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      border: 2px solid #d8c39b;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      background: #fff;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: Consolas, monospace;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #d9a12d;
      box-shadow: 0 4px 0 #9a7020;
    }
    button.secondary {
      background: #728076;
      box-shadow: 0 4px 0 #4b554e;
    }
    button.danger {
      background: #bb5d52;
      box-shadow: 0 4px 0 #7e3c35;
    }
    .small-input {
      width: 80px;
    }
    .note {
      color: #7d6d58;
      font-size: 14px;
      margin-top: 14px;
    }
    .status {
      margin-top: 18px;
      font-weight: 700;
      color: #b34232;
    }
    pre {
      background: #fff;
      border: 2px solid #d8c39b;
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Item Checker + Cooking Refining Timer</h1>
    <p>ユーザー名を複数入力し、ゲーム内表示名・内部名・部分一致のどれでもアイテムを検索できます。</p>
    <p>例: <code>Small Patch of Leaves</code> / <code>placeable_leafy_floor_1x1</code> / <code>leafy</code></p>

    <label for="itemInput">調べたいアイテム名 / 内部名</label>
    <input id="itemInput" type="text" placeholder="アイテム名 / 内部名 / 部分一致" />

    <label for="playersInput">ユーザーリスト（players_multi_example.jsonから自動読み込み）</label>
    <textarea id="playersInput" placeholder="players_multi_example.json から読み込みます。読み込み後は自由に入力・削除・編集できます。"></textarea>

    <div class="row">
      <button id="checkBtn">まとめて調べる</button>
      <button id="copyBtn" class="secondary">結果をコピー</button>
      <button id="stopBtn" class="danger">停止</button>
    </div>

    <div class="row">
      <label for="parallelInput" style="margin:0;">同時取得:</label>
      <input id="parallelInput" class="small-input" type="number" min="1" max="10" value="3" />
    </div>

    <div class="row">
      <label for="sortSelect" style="margin:0;">並び順:</label>
      <select id="sortSelect" style="width:180px;">
        <option value="count_desc">アイテム数多い順</option>
        <option value="count_asc">アイテム数少ない順</option>
        <option value="input">入力順</option>
        <option value="name">名前順</option>
      </select>
    </div>

    <p class="note">
      ユーザーリストは players_multi_example.json から初期表示だけ自動読み込みします。
      その後はテキストエリアで追加・削除・編集できます。検索時は現在の入力内容を使います。
    </p>

    <div id="status" class="status"></div>
    <pre id="result">結果がここに表示されます。</pre>
  </main>

  <script>
    let stopRequested = false;
    let lastResultText = "";

    async function loadDefaultPlayers() {
      const textarea = document.getElementById("playersInput");
      const status = document.getElementById("status");

      try {
        const res = await fetch("players_multi_example.json");
        if (!res.ok) {
          throw new Error("players_multi_example.json が見つかりません");
        }

        const data = await res.json();
        let players = [];

        if (Array.isArray(data)) {
          players = data;
        } else if (Array.isArray(data.players)) {
          players = data.players;
        } else if (Array.isArray(data.users)) {
          players = data.users;
        }

        textarea.value = players
          .map(function(name) {
            if (typeof name === "string") return name.trim();
            if (name && typeof name.username === "string") return name.username.trim();
            if (name && typeof name.name === "string") return name.name.trim();
            return "";
          })
          .filter(function(name) {
            return name.length > 0;
          })
          .join("\n");

        status.textContent = "";
      } catch (err) {
        console.error(err);
        textarea.placeholder = "players_multi_example.json の読み込みに失敗しました。手入力してください。";
        status.textContent = "players_multi_example.json の読み込みに失敗しました: " + err.message;
      }
    }

    function getPlayersFromInput() {
      const textarea = document.getElementById("playersInput");

      return textarea.value
        .split(/\r?\n|,/)
        .map(function(name) {
          return name.trim();
        })
        .filter(function(name) {
          return name.length > 0;
        });
    }

    function normalizeText(text) {
      return String(text || "").toLowerCase().trim();
    }

    function itemMatches(item, query) {
      const q = normalizeText(query);
      const displayName = normalizeText(item.displayName || item.name || item.itemName || "");
      const internalName = normalizeText(item.internalName || item.tokenName || item.assetName || item.id || "");

      return displayName === q ||
        internalName === q ||
        displayName.includes(q) ||
        internalName.includes(q);
    }

    async function fetchPlayerInventory(playerName) {
      /*
        ここは既存のAPI取得処理に差し替えてください。
        このファイルでは、画面・入力編集・JSON初期読み込み部分を安全に整理しています。
      */
      return {
        player: playerName,
        items: []
      };
    }

    async function runWithConcurrency(items, limit, worker) {
      const results = [];
      let index = 0;

      async function next() {
        while (index < items.length && !stopRequested) {
          const currentIndex = index;
          index += 1;
          results[currentIndex] = await worker(items[currentIndex], currentIndex);
        }
      }

      const workers = [];
      for (let i = 0; i < limit; i += 1) {
        workers.push(next());
      }

      await Promise.all(workers);
      return results;
    }

    async function checkItems() {
      stopRequested = false;

      const itemQuery = document.getElementById("itemInput").value.trim();
      const players = getPlayersFromInput();
      const parallel = Math.max(1, Math.min(10, Number(document.getElementById("parallelInput").value || 3)));
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      if (!itemQuery) {
        status.textContent = "アイテム名を入力してください。";
        return;
      }

      if (players.length === 0) {
        status.textContent = "ユーザー名を入力してください。";
        return;
      }

      status.textContent = "取得中...";
      result.textContent = "";

      const rows = await runWithConcurrency(players, parallel, async function(playerName, idx) {
        status.textContent = "取得中... " + (idx + 1) + " / " + players.length + " : " + playerName;

        try {
          const inventory = await fetchPlayerInventory(playerName);
          const matchedItems = (inventory.items || []).filter(function(item) {
            return itemMatches(item, itemQuery);
          });

          const count = matchedItems.reduce(function(sum, item) {
            return sum + Number(item.amount || item.count || item.quantity || 1);
          }, 0);

          return {
            player: playerName,
            count: count,
            matchedItems: matchedItems,
            error: ""
          };
        } catch (err) {
          return {
            player: playerName,
            count: 0,
            matchedItems: [],
            error: err.message || String(err)
          };
        }
      });

      const sortMode = document.getElementById("sortSelect").value;
      const sortedRows = rows.filter(Boolean).slice();

      if (sortMode === "count_desc") {
        sortedRows.sort(function(a, b) { return b.count - a.count; });
      } else if (sortMode === "count_asc") {
        sortedRows.sort(function(a, b) { return a.count - b.count; });
      } else if (sortMode === "name") {
        sortedRows.sort(function(a, b) { return a.player.localeCompare(b.player); });
      }

      const total = sortedRows.reduce(function(sum, row) {
        return sum + row.count;
      }, 0);

      const lines = [];
      lines.push("検索アイテム: " + itemQuery);
      lines.push("対象ユーザー数: " + players.length);
      lines.push("合計: " + total);
      lines.push("");
      lines.push("---- 結果 ----");

      sortedRows.forEach(function(row) {
        if (row.error) {
          lines.push(row.player + " : ERROR - " + row.error);
        } else {
          lines.push(row.player + " : " + row.count);
        }
      });

      lastResultText = lines.join("\n");
      result.textContent = lastResultText;
      status.textContent = stopRequested ? "停止しました。" : "完了しました。";
    }

    async function copyResult() {
      const text = lastResultText || document.getElementById("result").textContent;

      try {
        await navigator.clipboard.writeText(text);
        document.getElementById("status").textContent = "結果をコピーしました。";
      } catch (err) {
        document.getElementById("status").textContent = "コピーに失敗しました。";
      }
    }

    document.getElementById("checkBtn").addEventListener("click", checkItems);
    document.getElementById("copyBtn").addEventListener("click", copyResult);
    document.getElementById("stopBtn").addEventListener("click", function() {
      stopRequested = true;
      document.getElementById("status").textContent = "停止リクエストを受け付けました。";
    });

    window.addEventListener("DOMContentLoaded", loadDefaultPlayers);
  </script>
</body>
</html>
